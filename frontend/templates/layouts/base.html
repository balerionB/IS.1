<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>

        {% block title %}PS-SRMS{% endblock %}

    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Project CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/base.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/layout.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/components.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/forms.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/tables.css') }}">

<link rel="stylesheet"
href="{{ url_for('static',
filename='css/dashboard.css') }}">
    {% block styles %}{% endblock %}

</head>

<body>

    {% include "layouts/sidebar.html" %}

    <div class="content">

        {% include "layouts/navbar.html" %}

        {% block content %}

        {% endblock %}

    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>
<script
src="{{ url_for('static',
filename='js/sidebar.js') }}">
</script>
    {% block scripts %}

    {% endblock %}

</body>

</html>
