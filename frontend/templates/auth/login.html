{% extends "layouts/auth.html" %}

{% block title %}

Login

{% endblock %}

{% block content %}

<div class="card-custom p-5">

    <div class="text-center mb-4">

        <i class="bi bi-shield-lock fs-1 text-primary"></i>

        <h2 class="mt-3">

            Welcome Back

        </h2>

        <p class="text-muted">

            Sign in to continue.

        </p>

    </div>

    <form id="loginForm">

        <!-- Email -->

        <div class="mb-3">

            <label>Email</label>

            <input
                type="email"
                class="form-control"
                id="email"
                required>

        </div>

        <!-- Password -->

        <div class="mb-4">

            <label>Password</label>

            <input
                type="password"
                class="form-control"
                id="password"
                required>

        </div>

        <button
        class="btn btn-primary-custom w-100">

            Login

        </button>

    </form>

    <div class="text-center mt-4">

        <a href="{{ url_for('auth.forgot_password') }}">

            Forgot Password?

        </a>

    </div>

</div>

{% endblock %}
