{% extends "layouts/base.html" %}

{% block title %}
Analytics Reports
{% endblock %}

{% block content %}

<div class="container-fluid">

    <!-- Page Header -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h2 class="fw-bold">

                Analytics Reports

            </h2>

            <p class="text-muted">

                Generate operational and executive reports.

            </p>

        </div>

    </div>

    <!-- Report Filters -->

    <div class="card-custom p-4 mb-4">

        <div class="row g-3">

            <div class="col-md-3">

                <label class="form-label">

                    From

                </label>

                <input
                type="date"
                id="fromDate"
                class="form-control">

            </div>

            <div class="col-md-3">

                <label class="form-label">

                    To

                </label>

                <input
                type="date"
                id="toDate"
                class="form-control">

            </div>

            <div class="col-md-3">

                <label class="form-label">

                    Department

                </label>

                <select
                id="reportDepartment"
                class="form-select">

                    <option value="all">

                        All Departments

                    </option>

                </select>

            </div>

            <div class="col-md-3">

                <label class="form-label">

                    Status

                </label>

                <select
                id="reportStatus"
                class="form-select">

                    <option value="all">

                        All Statuses

                    </option>

                    <option>Submitted</option>
                    <option>Assigned</option>
                    <option>In Progress</option>
                    <option>Resolved</option>

                </select>

            </div>

        </div>

        <div class="mt-4">

            <button
            id="previewReport"
            class="btn btn-primary-custom">

                Preview Report

            </button>

            <button
            id="exportPDF"
            class="btn btn-danger">

                Export PDF

            </button>

            <button
            id="exportExcel"
            class="btn btn-success">

                Export Excel

            </button>

        </div>

    </div>

    <!-- Report Preview -->

    <div class="card-custom p-4">

        <h4>

            Report Preview

        </h4>

        <hr>

        <div id="reportPreview">

            <div class="text-center text-muted">

                Select filters and click
                <strong>Preview Report</strong>.

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block scripts %}

<script
src="{{ url_for('static',
filename='js/analytics.js') }}">
</script>

{% endblock %}
